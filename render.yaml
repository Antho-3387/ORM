services:
  - type: web
    name: magic-decks-app
    runtime: node
    plan: free
    rootDir: orm
    buildCommand: npm install && npm run build
    startCommand: npm run start
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: magic-decks-db
          property: connectionString
