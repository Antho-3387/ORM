services:
  - type: web
    name: magic-decks-app
    runtime: node
    plan: free
    buildCommand: cd orm && npm install && npm run build
    startCommand: cd orm && npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: magic-decks-db
          property: connectionString
